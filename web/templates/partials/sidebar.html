<!-- web/templates/partials/sidebar.html -->
<aside class="fixed left-0 top-0 h-screen w-64 bg-slate-900/95 border-r border-white/5 flex flex-col z-40">
  <!-- Logo -->
  <div class="p-6 border-b border-white/5">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-indigo-500/20 flex items-center justify-center text-xl">🤖</div>
      <div>
        <p class="font-bold text-white text-sm">TG Bot Manager</p>
        <p class="text-xs text-slate-500">Multi-Group Dashboard</p>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 p-4 space-y-1">
    <a href="/dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm
      {% if request.url.path == '/dashboard' %}bg-indigo-500/15 text-indigo-300 border border-indigo-500/20
      {% else %}text-slate-400 hover:text-white hover:bg-white/5{% endif %} transition-all">
      <span>🏠</span> My Groups
    </a>
    <a href="/logout" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-slate-400 hover:text-red-400 hover:bg-red-500/5 transition-all mt-4">
      <span>🚪</span> Sign Out
    </a>
  </nav>

  <!-- Footer -->
  <div class="p-4 border-t border-white/5">
    <p class="text-xs text-slate-600">Powered by Aiogram 3 + FastAPI</p>
  </div>
</aside>
