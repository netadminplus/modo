# =============================================================================
# alembic.ini
# Alembic database migration configuration.
# Run: alembic revision --autogenerate -m "description"
#      alembic upgrade head
# =============================================================================

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# URL is read from env in migrations/env.py — do NOT hardcode here
sqlalchemy.url =

[post_write_hooks]
# hooks.type = console_scripts
# hooks.entrypoint = black
# hooks.options = REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
