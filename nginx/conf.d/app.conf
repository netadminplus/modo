# nginx/conf.d/app.conf
# Virtual host config for the Telegram Bot Dashboard.
# Replace "yourdomain.com" with your actual domain (or use envsubst in entrypoint).

# ── HTTP → HTTPS redirect + Certbot ACME challenge ───────────────────────────
server {
    listen 80;
    server_name yourdomain.com;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (TLS 1.2/1.3 + Let's Encrypt) ─────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # ── SSL Certificates (managed by Certbot) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    # ── SSL Hardening ─────────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Client limits ─────────────────────────────────────────────────────────
    client_max_body_size 10M;

    # ── Proxy to FastAPI app ──────────────────────────────────────────────────
    location / {
        proxy_pass          http://app_backend;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_read_timeout  90;
        proxy_connect_timeout 90;
    }

    # ── Static files (served directly by Nginx for performance) ───────────────
    location /static/ {
        alias /app/web/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Rate-limit auth endpoints ─────────────────────────────────────────────
    location /login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://app_backend;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /auth/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://app_backend;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── API rate limiting ─────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://app_backend;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Health check (no auth required) ──────────────────────────────────────
    location /health {
        proxy_pass http://app_backend/health;
        access_log off;
    }
}
